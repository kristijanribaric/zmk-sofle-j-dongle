# Shared config for all eyelash_sofle shields (dongle + peripherals).
#
# Per-shield settings live in boards/shields/eyelash_sofle/*.conf.
# After the ESB-transport migration BT/BLE is disabled, so any BT_*
# tunables are intentionally absent here.

# Sleep after one hour (1 * 60 * 60 * 1000 ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=7200000
CONFIG_ZMK_SLEEP=y

# EC11 rotary encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# RGB max brightness (lower = cooler rectifier components)
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=60

# Pointing / mouse
CONFIG_ZMK_MOUSE=y

# HID
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=n

# Matrix debounce
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=8
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=8
