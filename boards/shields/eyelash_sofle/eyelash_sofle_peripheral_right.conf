#
# Right half = ESB primary transmitter (PTX), peripheral id 2.
#

# Enable SPI
CONFIG_SPI=y
#EXT POWER
CONFIG_ZMK_EXT_POWER=y
CONFIG_INPUT=y
CONFIG_ZMK_BACKLIGHT=y
CONFIG_ZMK_BACKLIGHT_BRT_START=100
CONFIG_ZMK_BACKLIGHT_ON_START=y
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=n

CONFIG_LED_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=90
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=160
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3

# ---------------- ESB split transport ----------------
CONFIG_ZMK_BLE=n
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_SPLIT_WIRED=n
CONFIG_ZMK_SPLIT_ESB=y
CONFIG_ZMK_SPLIT_ESB_PERIPHERAL_ID=2
CONFIG_ZMK_SPLIT_ESB_PROTO_TX_ACK=y
CONFIG_MPSL_TIMESLOT_SESSION_COUNT=1
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_ESB_MAX_PAYLOAD_LENGTH=48
CONFIG_ESB_TX_FIFO_SIZE=1
CONFIG_INPUT_THREAD_STACK_SIZE=4096
CONFIG_INPUT_QUEUE_MAX_MSGS=256
# CONFIG_ZMK_SPLIT_ESB_LOG_LEVEL_DBG=y

# Battery reporting back to the dongle over ESB
CONFIG_ZMK_BATTERY_REPORTING=y

# nice_view peripheral display.
# CONFIG_ZMK_DISPLAY pulls in LVGL and the nice_view widget; the widget
# uses sys_rand_get() so an entropy source must be selected. The nRF
# entropy driver is selected by default once ENTROPY_GENERATOR=y is set.
CONFIG_ZMK_DISPLAY=y
CONFIG_ENTROPY_GENERATOR=y
# Bump LV memory pool a little to give the nice_view widgets headroom
# (ZMK issue #3219). 8192 is the default; 16384 is what
# englmaxi/zmk-dongle-display ships and removes intermittent glyph
# rendering artifacts on Zephyr 4.1.
CONFIG_LV_Z_MEM_POOL_SIZE=16384

# Drop the Zephyr 4.1 in-tree sharp,ls0xx driver and build our vendored
# copy (drivers/display/ls0xx.c) instead. The in-tree driver ignores
# the `serial-vcom-inversion` / `serial-vcom-interval` DT properties
# that ZMK 0.4 sets on the nice_view overlay (see ZMK PR #3294),
# leaving the LCD's VCOM uninverted and producing a fast "refresh"
# flicker. The vendored driver implements the SPI-based VCOM toggle.
CONFIG_LS0XX=n
CONFIG_ZMK_SOFLE_LS0XX=y
