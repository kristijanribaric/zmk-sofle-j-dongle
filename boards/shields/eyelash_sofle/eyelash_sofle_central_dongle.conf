#
# Dongle = ESB primary receiver (PRX), USB-only HID to host.
# BLE and the default BLE/wired split transports are disabled.
#

# enable display drivers
CONFIG_ZMK_DISPLAY=y

#EXT POWER
CONFIG_ZMK_EXT_POWER=y

CONFIG_ZMK_HID_REPORT_TYPE_NKRO=n

#EC11 enable
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_USB_BOOT=y

# ---------------- ESB split transport ----------------
# Disable BLE on the dongle entirely (USB-only)
CONFIG_ZMK_BLE=n
# Disable default split transports
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_SPLIT_WIRED=n
# Enable ESB split transport
CONFIG_ZMK_SPLIT_ESB=y
# Central does not need a peripheral id of its own. Set the maximum
# CONFIG_ZMK_SPLIT_ESB_PERIPHERAL_ID we expect from a peripheral.
CONFIG_ZMK_SPLIT_ESB_PERIPHERAL_COUNT=2
# ESB tunables (see zmk-feature-split-esb README)
CONFIG_ZMK_SPLIT_ESB_PROTO_TX_ACK=y
CONFIG_MPSL_TIMESLOT_SESSION_COUNT=1
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_ESB_MAX_PAYLOAD_LENGTH=48
CONFIG_ESB_TX_FIFO_SIZE=1
CONFIG_INPUT_THREAD_STACK_SIZE=4096
CONFIG_INPUT_QUEUE_MAX_MSGS=256
# CONFIG_ZMK_SPLIT_ESB_LOG_LEVEL_DBG=y

# Battery reporting from peripherals over ESB.
# Per the ESB README this BLE-named option is also honored for ESB.
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
# The two settings below are normally derived from BT_MAX_PAIRED, but with
# CONFIG_ZMK_BLE=n their default expressions resolve to empty and break the
# Zephyr `configs.c` asm generation. Pin them explicitly here (one slot per
# peripheral half).
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_QUEUE_SIZE=5

# Display / RGB / backlight (unchanged from BLE config)
CONFIG_SPI=y
CONFIG_ZMK_BACKLIGHT=y
CONFIG_ZMK_BACKLIGHT_BRT_START=100
CONFIG_ZMK_BACKLIGHT_ON_START=y
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=n

CONFIG_LED_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=90
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=160
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3
